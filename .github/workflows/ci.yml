name: CI/CD Pipeline - Unit Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # Faz cache das dependências do Gradle para acelerar a execução

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Tests with Gradle
        run: ./gradlew test
