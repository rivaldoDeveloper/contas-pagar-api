spring:
  datasource:
    # Configura o H2 para rodar em memória com modo de compatibilidade PostgreSQL
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  jpa:
    # Garante que o dialeto correto do Hibernate seja usado para o H2
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: false # Desabilita o Flyway para testes de unidade/integração que usam H2

  jwt:
    secret:
      key: "testesenhasecreta_testesenhasecreta_testesenhasecreta"
